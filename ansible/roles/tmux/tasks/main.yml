---
# tasks file for tmux role

- name: Install tmux package
  ansible.builtin.package:
    name: tmux
    state: present
  become: true
  tags:
    - all
    - tmux

- name: Deploy tmux configuration to /etc/tmux.conf
  ansible.builtin.copy:
    src: tmux.conf
    dest: /etc/tmux.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - all
    - tmux

- name: Deploy tmux configuration to user home directory
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'
  when: tmux_user_config | default(true)
  tags:
    - all
    - tmux

- name: Configure tmux auto-attach in bashrc
  ansible.builtin.blockinfile:
    path: "{{ ansible_facts['env']['HOME'] }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - tmux auto-attach"
    block: |
      if [[ -z "$TMUX" ]] ;then
         ID="`tmux ls | grep -vm1 attached | cut -d: -f1`" # get the id of a deattached session
         if [[ -z "$ID" ]] ;then # if not available create a new one
             tmux new-session
         else
             tmux attach-session -t "$ID" # if available attach to it
         fi
      fi
    create: true
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'
  when: tmux_auto_attach | default(true)
  tags:
    - all
    - tmux