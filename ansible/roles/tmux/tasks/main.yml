---
# tasks file for tmux role

- name: Install tmux package
  ansible.builtin.package:
    name: tmux
    state: present
  become: true
  tags:
    - all
    - tmux

- name: Deploy tmux configuration to /etc/tmux.conf
  ansible.builtin.copy:
    src: tmux.conf
    dest: /etc/tmux.conf
    owner: root
    group: root
    mode: '0644'
  become: true
  tags:
    - all
    - tmux

- name: Deploy tmux configuration to user home directory
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux.conf"
    owner: "{{ ansible_facts['user_id'] }}"
    mode: '0644'
  when: tmux_user_config | default(true)
  tags:
    - all
    - tmux