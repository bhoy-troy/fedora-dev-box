---
# defaults file for ldap role

# LDAP configuration
# NOTE: Override these in secrets.yml
ldap_uri: "ldaps://s1.idm-001.prod.iad2.dc.example.com/ ldaps://s2.idm-001.prod.iad2.dc.example.com/ ldaps://s1.idm-001.prod.rdu2.dc.example.com/ ldaps://s2.idm-001.prod.rdu2.dc.example.com/"
ldap_base: "dc=ipa,dc=redhat,dc=com"
ldap_sasl_mech: "GSSAPI"
ldap_sasl_nocanon: "on"
ldap_tls_reqcert: "demand"

# LDAP host for SSH host key lookups
# NOTE: Override in secrets.yml for your organization
ldap_host: "ldap://s2.idm-001.prod.rdu2.dc.example.com"

# Kerberos realm configuration
# NOTE: Override in secrets.yml for your organization
kerberos_realm: "IPA.EXAMPLE.COM"

# Dist-git bastion configuration
# NOTE: Override in secrets.yml for your organization
distgit_bastion_host: "bastion-iad2.corp.example.com"
